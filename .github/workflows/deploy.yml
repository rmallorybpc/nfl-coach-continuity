name: Deploy to Pages

# Publishes the site via the GitHub Actions Pages source.
# Set Settings > Pages > Source to "GitHub Actions" for this to take effect.
# The site deploys only if the reproducibility job passes first.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pandas numpy statsmodels
      - name: Reproduce all regressions from the committed frame
        run: python code/run_models.py --frame data/production_retention_frame.csv

  deploy:
    needs: reproduce
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
