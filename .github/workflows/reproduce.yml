name: reproduce

# Reproducibility check for pull requests: run every model from the committed
# frame. Deploys on main are gated by the same check inside deploy.yml.

on:
  pull_request:
  workflow_dispatch:

jobs:
  run-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pandas numpy statsmodels
      - name: Reproduce all regressions from the committed frame
        run: python code/run_models.py --frame data/production_retention_frame.csv
